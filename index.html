<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Language Learning & Speaking Platform</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <!-- Firebase SDK Modullari -->
    <script type="module">
      import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
      import {
        getAuth,
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        signOut,
      } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js'
      import {
        getFirestore,
        doc,
        setDoc,
        getDoc,
      } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js'

      // SIZNING SHAXSIY FIREBASE KALITLARINGIZ (`image_e93e9d.png`dan olindi)
      const firebaseConfig = {
        apiKey: 'AIzaSyCTQcpe-zIpupCKV6XM329PakwRcL0Ya0I',
        authDomain: 'english-vocabs-memorizer.firebaseapp.com',
        projectId: 'english-vocabs-memorizer',
        storageBucket: 'english-vocabs-memorizer.firebasestorage.app',
        messagingSenderId: '342844815020',
        appId: '1:342844815020:web:4f59c0c0cb43cec17cd109',
        measurementId: 'G-J1H9JL75DS',
      }

      // Firebase xizmatlarini global oynaga (window) ulash
      const app = initializeApp(firebaseConfig)
      window.auth = getAuth(app)
      window.db = getFirestore(app)
      window.fbMethods = {
        signInWithEmailAndPassword,
        createUserWithEmailAndPassword,
        signOut,
        doc,
        setDoc,
        getDoc,
      }
    </script>
  </head>
  <body>
    <div class="auth-container" id="auth-screen">
      <div class="auth-box">
        <h2 id="auth-title">Tizimga Kirish</h2>
        <p id="auth-subtitle">Platformadan foydalanish uchun profilingizga kiring</p>

        <div class="auth-form">
          <input
            type="text"
            id="auth-username"
            placeholder="Foydalanuvchi nomi (username)..."
            autocomplete="off"
          />

          <div class="password-wrapper">
            <input type="password" id="auth-password" placeholder="Parol..." />
            <button
              type="button"
              class="toggle-password-btn"
              id="toggle-password-eye"
              onclick="togglePasswordVisibility()"
              title="Parolni ko'rsatish"
            >
              👁️
            </button>
          </div>

          <button id="auth-main-btn" onclick="handleAuth()">Kirish</button>
        </div>

        <div class="auth-toggle">
          <span id="auth-toggle-text">Akkauntingiz yo'qmi?</span>
          <a href="#" id="auth-toggle-link">Ro'yxatdan o'tish</a>
        </div>
      </div>
    </div>

    <div class="app-container" id="app-screen">
      <div class="sidebar">
        <div class="profile-badge">
          <div class="avatar">👤</div>
          <div class="profile-info">
            <span class="welcome-text">Xush kelibsiz,</span>
            <strong id="user-display-name">Mehmon</strong>
          </div>
          <button class="logout-btn" onclick="logout()" title="Profildan chiqish">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
          </button>
        </div>

        <div class="section-tabs">
          <button class="tab-btn active" id="tab-vocab" onclick="switchSection('lugat')">
            📝 Lug'at
          </button>
          <button class="tab-btn" id="tab-speaking" onclick="switchSection('speaking')">
            🗣️ Speaking
          </button>
        </div>

        <h2 id="sidebar-title">Darslar</h2>
        <div class="lesson-list" id="lesson-list"></div>

        <div class="add-lesson-panel">
          <input type="text" id="new-item-name" placeholder="Yangi dars nomi..." />
          <button id="sidebar-add-btn" onclick="handleAddNewSidebarItem()">+ Qo'shish</button>
        </div>

        <div class="security-panel">
        </div>
      </div>

      <div class="main-content">
        <div id="vocab-section-content" class="section-content">
          <div class="content-header">
            <h1 id="current-lesson-title">Lesson 1</h1>
            <div class="progress" id="progress">1 / 32</div>
          </div>

          <div class="translator-panel">
            <input type="text" id="new-word-en" placeholder="Inglizcha so'z..." />
            <input type="text" id="new-word-uz" placeholder="O'zbekcha tarjimasi..." />
            <button id="add-word-btn" onclick="handleAddWord()">So'z Qo'shish</button>
          </div>

          <div class="settings-bar">
            <button class="settings-btn active" id="mode-toggle-btn" onclick="toggleMode()">
              Rejim: EN ➔ UZ
            </button>
            <button class="settings-btn" id="view-words-btn" onclick="openWordsModal()">
              📋 So'zlarni Ko'rish
            </button>
            <button class="settings-btn" id="clear-words-btn" onclick="clearCurrentLessonWords()">🔄 Tozalash</button>
          </div>

          <div class="card-container" id="main-flashcard" onclick="handleCardClick()">
            <div class="card" id="card">
              <div class="card-face card-front">
                <div class="word" id="card-word-text">Yuklanmoqda...</div>
                <div class="hint" id="card-sub-text">Tarjimasini koʻrish uchun bosing</div>
              </div>
              <div class="card-face card-back">
                <div class="translation" id="card-back-text">Yuklanmoqda...</div>
                <div class="hint">Orqaga qaytish uchun bosing</div>
              </div>
            </div>
          </div>

          <div class="words-list-container" id="words-list-area" class="hidden">
          </div>

          <div class="controls" id="controls-area">
            <button class="nav-btn" id="btn-prev" onclick="handlePrev()">Orqaga</button>
            <button class="nav-btn" id="btn-shuffle" onclick="handleShuffle()">🔀</button>
            <button class="nav-btn" id="btn-next" onclick="handleNext()">Oldinga</button>
          </div>
        </div>

        <div id="speaking-section-content" class="section-content hidden">
          <div class="content-header">
            <h1 id="current-topic-title">Mavzu tanlanmagan</h1>
            <p class="progress" id="speaking-count">Savollar soni: 0</p>
          </div>

          <div class="speaking-input-panel">
            <input type="text" id="new-speak-q" placeholder="Savol (Question)..." />
            <textarea
              id="new-speak-a"
              placeholder="Namunaviy javob (Sample Answer)..."
              rows="3"
            ></textarea>
            <button id="add-speaking-btn" onclick="handleAddSpeaking()">Savol-Javobni Qo'shish</button>
          </div>

          <div class="speaking-cards-container" id="speaking-cards-container"></div>
        </div>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
